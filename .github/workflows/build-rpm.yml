name: Build RPM

on:
    push:
        branches: [master, main]
    pull_request:
        branches: [master, main]
    workflow_dispatch:

concurrency:
    group: build-rpm-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build-rpm:
        name: Build RPM (Docker)
        runs-on: ubuntu-latest
        timeout-minutes: 60

        steps:
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Build RPM in Docker container
              run: make rpm-in-docker

            - name: Upload RPM artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: loongshield-rpm
                  path: build/rpmbuild-docker/RPMS/**/*.rpm
                  if-no-files-found: error

    test-rpm:
        name: Test RPM install on ${{ matrix.name }}
        runs-on: ubuntu-latest
        needs: build-rpm
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: "CentOS Stream 9"
                      image: "quay.io/centos/centos:stream9"
                    - name: "Anolis OS 23"
                      image: "registry.openanolis.cn/openanolis/anolisos:23"
        container:
            image: ${{ matrix.image }}
        defaults:
            run:
                shell: bash

        steps:
            - name: Optimize package manager config
              run: |
                  set -e
                  set -x

                  if [ -f /etc/yum.repos.d/CentOS-Stream.repo ]; then
                      mkdir -p /etc/yum.repos.d/loongshield-disabled
                      find /etc/yum.repos.d -maxdepth 1 -name '*.repo' ! -name 'CentOS-Stream.repo' -exec mv {} /etc/yum.repos.d/loongshield-disabled/ \; 2>/dev/null || true
                      cat >/etc/yum.repos.d/CentOS-Stream.repo <<'EOF'
                  [baseos]
                  name=CentOS Stream 9 - BaseOS
                  baseurl=https://mirror.stream.centos.org/9-stream/BaseOS/$basearch/os/
                  enabled=1
                  gpgcheck=0
                  repo_gpgcheck=0

                  [appstream]
                  name=CentOS Stream 9 - AppStream
                  baseurl=https://mirror.stream.centos.org/9-stream/AppStream/$basearch/os/
                  enabled=1
                  gpgcheck=0
                  repo_gpgcheck=0

                  [crb]
                  name=CentOS Stream 9 - CRB
                  baseurl=https://mirror.stream.centos.org/9-stream/CRB/$basearch/os/
                  enabled=1
                  gpgcheck=0
                  repo_gpgcheck=0
                  EOF
                  fi

                  if [ -d /etc/yum.repos.d ]; then
                      sed -i -E 's|https?://mirrors.openanolis.cn/anolis/|https://mirrors.aliyun.com/anolis/|g' /etc/yum.repos.d/*.repo 2>/dev/null || true
                      sed -i -E 's|https?://mirrors.cloud.aliyuncs.com/|https://mirrors.aliyun.com/|g' /etc/yum.repos.d/*.repo 2>/dev/null || true
                  fi

                  conf=""
                  if [ -f /etc/dnf/dnf.conf ]; then
                      conf=/etc/dnf/dnf.conf
                  elif [ -f /etc/yum.conf ]; then
                      conf=/etc/yum.conf
                  fi

                  if [ -n "$conf" ]; then
                      sed -i 's/^max_parallel_downloads=.*/max_parallel_downloads=20/' "$conf" || true
                      grep -q '^max_parallel_downloads=' "$conf" || sed -i '/^\[main\]$/a max_parallel_downloads=20' "$conf"
                  fi

            - name: Download RPM artifacts
              uses: actions/download-artifact@v4
              with:
                  name: loongshield-rpm
                  path: ./rpm-packages

            - name: Install RPM package
              run: |
                  set -e
                  set -x

                  if command -v dnf >/dev/null 2>&1; then
                      PM=dnf
                  elif command -v yum >/dev/null 2>&1; then
                      PM=yum
                  else
                      echo "No supported package manager found (dnf/yum)." >&2
                      exit 1
                  fi

                  mapfile -t rpms < <(find ./rpm-packages -type f -name '*.rpm' | sort)
                  test ${#rpms[@]} -gt 0
                  "$PM" install -y "${rpms[@]}"

            - name: Verify installed package
              run: |
                  set -e
                  set -x

                  loongshield version
                  test -x /usr/sbin/loongshield
                  test -x /usr/sbin/loonjit
                  test -f /etc/loongshield/seharden/agentos_baseline.yml
                  test -f /etc/loongshield/seharden/cis_alinux_3.yml
                  test -f /usr/share/licenses/loongshield/LICENSE
