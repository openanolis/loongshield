name: Release RPM

on:
    push:
        tags:
            - "v*"

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write

jobs:
    release:
        name: Build and publish RPMs
        runs-on: ubuntu-latest
        timeout-minutes: 60

        steps:
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Detect prerelease tag
              id: prerelease
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  prerelease=false
                  if [[ "$tag" == *alpha* || "$tag" == *beta* || "$tag" == *rc* ]]; then
                      prerelease=true
                  fi
                  echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

            - name: Build RPM in Docker container
              run: make rpm-in-docker

            - name: Upload workflow artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: loongshield-release-rpm
                  path: build/rpmbuild-docker/RPMS/**/*.rpm
                  if-no-files-found: error

            - name: Publish GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  prerelease: ${{ steps.prerelease.outputs.prerelease == 'true' }}
                  files: build/rpmbuild-docker/RPMS/**/*.rpm
