services:
  loongshield-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    image: loongshield-dev:latest
    container_name: loongshield-dev

    # Mount the project directory
    volumes:
      - .:/workspace:cached
      - /workspace/build-docker

    stdin_open: true
    tty: true
    privileged: true
    working_dir: /workspace
    environment:
      - O=build-docker
      - TERM=xterm-256color
      - MAKEFLAGS=-j$(nproc)
    network_mode: host
    command: /bin/bash
