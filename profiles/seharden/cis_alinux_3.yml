        func: sysctl.get_live_value
        params:
          key: "kernel.randomize_va_space"
      - name: aslr_disk
        func: file.find_pattern
        params:
          paths:
            - "/etc/sysctl.conf"
            - "/etc/sysctl.d/*.conf"
            - "/usr/local/lib/sysctl.d/*.conf"
            - "/usr/lib/sysctl.d/*.conf"
            - "/lib/sysctl.d/*.conf"
            - "/run/sysctl.d/*.conf"
          pattern: "^%s*kernel%.randomize_va_space%s*=%s*2"
    assertion:
      all_of:
        - actual: "%{probe.aslr_live}"
          key: "value"
          compare: equals
          expected: "2"
          message: "The live 'kernel.randomize_va_space' kernel parameter is not set to 2."
        - actual: "%{probe.aslr_disk}"
          key: "found"
          compare: is_true
          message: "The 'kernel.randomize_va_space=2' setting is not found in any sysctl configuration file."
    reinforce:
      - action: sysctl.set_value
        params: { key: "kernel.randomize_va_space", value: "2" }

