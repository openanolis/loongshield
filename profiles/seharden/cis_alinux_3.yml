              expected: "/bin/false"
              message: "The 'install squashfs' command is not set to /bin/true or /bin/false."
    reinforce:
      - action: kmod.unload
        params: { name: "squashfs" }
      - action: kmod.blacklist
        params: { name: "squashfs" }
      - action: kmod.set_install_command
