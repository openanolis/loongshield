---
policy: "CIS Benchmark for Alibaba Cloud Linux 3"
title: "CIS Benchmark for Alibaba Cloud Linux 3"
id: cis_alinux_3
version: "0.0.2"
source: https://www.cisecurity.org/cis-benchmarks/#Alibaba_Cloud_Linux_3
levels:
  - id: l1_server
  - id: l2_server
    inherits_from:
      - l1_server
  - id: l1_workstation
  - id: l2_workstation
    inherits_from:
      - l1_workstation
reference_type: cis
product: alinux3

rules:
  - id: "1.1.1.1"
    desc: "Ensure cramfs is disabled"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: loaded_status
        func: kmod.is_loaded
        params: { name: "cramfs" }
      - name: blacklist_status
        func: kmod.is_blacklisted
        params: { name: "cramfs" }
      - name: install_cmd_status
        func: kmod.get_install_command
        params: { name: "cramfs" }
    assertion:
      all_of:
        - actual: "%{probe.loaded_status}"
          key: "loaded"
          compare: is_falsy
          message: "Module 'cramfs' is currently loaded but should be disabled."
        - actual: "%{probe.blacklist_status}"
          key: "blacklisted"
          compare: is_true
          message: "Module 'cramfs' is not blacklisted in /etc/modprobe.d/*."
        - any_of:
            - actual: "%{probe.install_cmd_status}"
              key: "command"
              compare: equals
              expected: "/bin/true"
              message: "The 'install cramfs' command is not set to /bin/true or /bin/false."
            - actual: "%{probe.install_cmd_status}"
              key: "command"
              compare: equals
              expected: "/bin/false"
              message: "The 'install cramfs' command is not set to /bin/true or /bin/false."
    reinforce:
      - action: kmod.unload
        params: { name: "cramfs" }
      - action: kmod.blacklist
        params: { name: "cramfs" }
      - action: kmod.set_install_command
        params: { name: "cramfs" }

  - id: "1.1.1.2"
