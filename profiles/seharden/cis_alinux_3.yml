        params:
          name: "systemd-coredump"
      - name: coredump_conf
        func: file.parse_key_values
        params:
          path: "/etc/systemd/coredump.conf"
      - name: limits_conf_check
        func: file.find_pattern
        params:
          paths:
            - "/etc/security/limits.conf"
            - "/etc/security/limits.d/*"
          pattern: "^[*]%s+hard%s+core%s+0"
      - name: suid_dumpable_sysctl
        func: sysctl.get_live_value
        params:
          key: "fs.suid_dumpable"
    assertion:
      all_of:
        - any_of:
            - actual: "%{probe.coredump_pkg}"
              key: "count"
              compare: equals
              expected: 0
              message: "systemd-coredump is installed, but its configuration is not compliant."
            - all_of:
                - actual: "%{probe.coredump_conf}"
                  key: "Storage"
                  compare: equals
                  expected: "none"
                  message: "systemd-coredump is installed, but Storage is not set to 'none' in /etc/systemd/coredump.conf."
                - actual: "%{probe.coredump_conf}"
                  key: "ProcessSizeMax"
                  compare: equals
                  expected: "0"
                  message: "systemd-coredump is installed, but ProcessSizeMax is not set to '0' in /etc/systemd/coredump.conf."
        - actual: "%{probe.limits_conf_check}"
          key: "found"
          compare: is_true
          message: "A core dump limit of '* hard core 0' is not set in /etc/security/limits.conf or /etc/security/limits.d/*."
        - actual: "%{probe.suid_dumpable_sysctl}"
          key: "value"
          compare: equals
          expected: "0"
          message: "The 'fs.suid_dumpable' kernel parameter is not set to 0."

