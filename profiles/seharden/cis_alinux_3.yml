    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: autofs_service_status
        func: services.get_unit_properties
        params: { name: "autofs" }
    assertion:
      any_of:
        - actual: "%{probe.autofs_service_status}"
          key: "UnitFileState"
          compare: equals
          expected: "disabled"
          message: "The 'autofs' service is enabled, but should be disabled."
        - actual: "%{probe.autofs_service_status}"
          key: "UnitFileState"
          compare: equals
          expected: "not-found"
          message: "The 'autofs' service is enabled, but should be disabled or uninstalled."

  - id: "1.1.22"
    desc: "Ensure /tmp is configured"
    level: ["l1_server", "l1_workstation"]
    probes:
