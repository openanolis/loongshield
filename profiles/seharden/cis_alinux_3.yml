        func: permissions.get_attributes
        params: { path: "/etc/motd" }
    assertion:
      all_of:
        - actual: "%{probe.motd_attrs}"
          key: "mode"
          compare: equals
          expected: 0644
          message: "Permissions on /etc/motd must be 0644"
        - actual: "%{probe.motd_attrs}"
          key: "uid"
          compare: equals
          expected: 0
          message: "Owner of /etc/motd must be root (uid 0)"
        - actual: "%{probe.motd_attrs}"
          key: "gid"
          compare: equals
          expected: 0
          message: "Group of /etc/motd must be root (gid 0)"

