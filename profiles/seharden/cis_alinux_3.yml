    assertion:
      all_of:
        - actual: "%{probe.loaded_status}"
          key: "loaded"
          compare: is_falsy
          message: "Module 'squashfs' is currently loaded but should be disabled."
        - actual: "%{probe.blacklist_status}"
          key: "blacklisted"
          compare: is_true
          message: "Module 'squashfs' is not blacklisted in /etc/modprobe.d/*."
        - any_of:
            - actual: "%{probe.install_cmd_status}"
              key: "command"
