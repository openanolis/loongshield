      - name: tmp_service_status
        func: services.get_unit_properties
        params: { name: "tmp.mount" }
    assertion:
      all_of:
        - # Assertion 1: Verify that /tmp is a mount point. (This part is unchanged)
          actual: "%{probe.tmp_mount_info}"
          key: "exists"
          compare: is_true
          message: "/tmp is not configured as a separate mount point."
        - # Assertion 2: Verify the systemd unit is static.
          actual: "%{probe.tmp_service_status}"
          key: "UnitFileState"
          compare: equals
          expected: "static"
          message: "The 'tmp.mount' service is not static."

  - id: "1.2.1"
    desc: "Ensure message of the day is configured properly"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: os_info
        func: file.parse_key_values
        params:
          path: "/etc/os-release"
      - name: motd_info_leak_check
        func: file.find_pattern
        params:
          paths:
            - "/etc/motd"
          pattern: "(?i)(\\\\[vrms]|%{probe.os_info.ID})"
    assertion:
      all_of:
        - actual: "%{probe.motd_info_leak_check}"
          key: "found"
          compare: is_falsy
          message: "Found system information (OS version, release, etc.) in /etc/motd, which is a security finding."

