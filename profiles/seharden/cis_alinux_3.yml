          key: "exists"
          compare: is_true
          message: "/tmp is not configured as a separate mount point."
        - actual: "%{probe.tmp_service_status}"
          key: "UnitFileState"
          compare: equals
          expected: "enabled"
          message: "The 'tmp.mount' service is not enabled."

