  - id: "1.3.1"
    desc: "Ensure GPG keys are configured"
    level: ["l1_server", "l1_workstation"]
    status: manual
    probes:
      - name: gpgkey_in_repo_files
        func: file.find_pattern
        params:
          paths:
            - "/etc/yum.repos.d/*"
            - "/etc/dnf/dnf.conf"
          pattern: "^%s*gpgkey%s*="
      - name: installed_gpg_keys
        func: packages.get_installed
        params:
          name: "gpg-pubkey-*"
    assertion:
      all_of:
        - actual: "%{probe.gpgkey_in_repo_files}"
          key: "found"
          compare: is_true
          message: "No 'gpgkey' directives were found in any yum/dnf repository files."
        - actual: "%{probe.installed_gpg_keys}"
          key: "count"
          compare: is_greater_than
          expected: 0
          message: "No 'gpg-pubkey' packages are installed, indicating no keys have been imported."

  - id: "1.3.2"
    desc: "Ensure gpgcheck is globally activated"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: dnf_conf_check
        func: file.parse_key_values
        params:
          path: "/etc/dnf/dnf.conf"
      - name: repo_gpgcheck_override
        func: file.find_pattern
        params:
          paths:
            - "/etc/yum.repos.d/*"
          pattern: "^%s*gpgcheck%s*=%s*[^1]"
    assertion:
      all_of:
        - actual: "%{probe.dnf_conf_check}"
          key: "gpgcheck"
          compare: equals
          expected: "1"
          message: "gpgcheck is not set to 1 in /etc/dnf/dnf.conf."
        - actual: "%{probe.repo_gpgcheck_override}"
          key: "found"
          compare: is_falsy
          message: "Found a repository file in /etc/yum.repos.d/ that disables gpgcheck (sets it to a value other than 1)."

  - id: "1.4.1"
    desc: "Ensure AIDE is installed"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: aide_installed
        func: packages.get_installed
        params:
          name: "aide"
    assertion:
      all_of:
        - actual: "%{probe.aide_installed}"
          key: "count"
          compare: is_greater_than
          expected: 0
          message: "The AIDE package is not installed."

  - id: "1.4.2"
    desc: "Ensure filesystem integrity is regularly checked"
    level: ["l1_server", "l1_workstation"]
    status: automated
    probes:
      - name: aide_cron_check
        func: file.find_pattern
        params:
          paths:
            - "/etc/cron.d/*"
            - "/etc/cron.hourly/*"
            - "/etc/cron.daily/*"
            - "/etc/cron.weekly/*"
            - "/etc/cron.monthly/*"
            - "/etc/crontab"
            - "/var/spool/cron/*"
          pattern: "^[^#].*/usr/s?bin/aide.*--check"
      - name: aide_service_status
        func: services.get_unit_properties
        params:
          name: "aidecheck.service"
      - name: aide_timer_status
        func: services.get_unit_properties
        params:
          name: "aidecheck.timer"
    assertion:
      any_of:
        - actual: "%{probe.aide_cron_check}"
          key: "found"
          compare: is_true
          message: "AIDE integrity check is not scheduled via cron or systemd timer."
        - all_of:
